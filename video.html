<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    
    <video src="https://www.youtube.com/watch?v=b5Tqpdj8tRs" width="200px" controls >See the video</video>

     <!-- this right here doesn't work -->
     <!-- reason -->

     <!-- The problem is that YouTube URLs don't work directly in the <video> tag. 
          The HTML <video> element only accepts direct video file links like .mp4, .webm, .ogg — not YouTube watch page URLs.
          YouTube streams its videos through its own player, so you can't just paste the URL in src. -->
</body>
</html>
